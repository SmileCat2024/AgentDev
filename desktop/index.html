<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop Browser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        .error {
            color: #ff6b6b;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 0, 0, 0.2);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Desktop Browser</h1>
        <p>正在尝试连接 localhost:2026</p>
        <p>如果页面没有加载，请确保2026端口上运行着服务</p>
        <div class="error">
            <strong>提示：</strong> 这是一个备用页面，正常情况下你应该看到来自 localhost:2026 的内容
        </div>
    </div>
</body>
</html>
